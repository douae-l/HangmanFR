<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu du Pendu Moderne</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="main-wrapper">
        <div class="theme-toggle" id="theme-toggle">
            <i class="fa-solid fa-moon"></i>
        </div>

        <div class="game-container">
            <!-- Left Side: Hangman Illustration -->
            <div class="hangman-section">
                <div class="hangman-drawing">
                    <svg class="hangman-svg" viewBox="0 0 300 300">
                        <!-- Stand -->
                        <line x1="20" y1="280" x2="100" y2="280" class="draw-part stand" />
                        <line x1="60" y1="280" x2="60" y2="40" class="draw-part stand" />
                        <line x1="60" y1="40" x2="180" y2="40" class="draw-part stand" />
                        <line x1="180" y1="40" x2="180" y2="80" class="draw-part stand" />

                        <!-- Body Parts (Hidden by default) -->
                        <circle cx="180" cy="100" r="20" class="draw-part body-part head" /> <!-- Head -->
                        <line x1="180" y1="120" x2="180" y2="200" class="draw-part body-part body" /> <!-- Body -->
                        <line x1="180" y1="140" x2="140" y2="180" class="draw-part body-part left-arm" />
                        <!-- Left Arm -->
                        <line x1="180" y1="140" x2="220" y2="180" class="draw-part body-part right-arm" />
                        <!-- Right Arm -->
                        <line x1="180" y1="200" x2="140" y2="250" class="draw-part body-part left-leg" />
                        <!-- Left Leg -->
                        <line x1="180" y1="200" x2="220" y2="250" class="draw-part body-part right-leg" />
                        <!-- Right Leg -->
                    </svg>
                </div>
                <h1 class="game-title">JEU DU PENDU</h1>
            </div>

            <!-- Right Side: Game Info & Controls -->
            <div class="game-content">
                <div class="word-display-container">
                    <ul class="word-display">
                        <!-- Letters will be injected here -->
                    </ul>
                </div>

                <div class="game-stats">
                    <div class="hint-box">
                        <span class="hint-label">Indice:</span>
                        <span class="hint-text"><b>Animaux</b> - Aboie toujours</span>
                    </div>
                    <div class="streak-box">
                        <span class="streak-label">Série:</span>
                        <b><span id="streak-count">0</span></b>
                    </div>
                    <div class="guesses-box">
                        <span class="guesses-label">Incorrect:</span>
                        <b class="wrong-guesses">0 / 6</b>
                    </div>
                </div>

                <div class="keyboard">
                    <!-- Keys will be generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over / Win Modal -->
    <div class="game-modal" id="game-modal">
        <div class="modal-content">
            <img src="#" alt="status-image" class="modal-img">
            <h2 class="modal-title">Perdu !</h2>
            <p class="modal-text">Le mot correct était : <b>...</b></p>
            <button class="play-again-btn">Rejouer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
